<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Cartas con Bootstrap</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-success vh-100 d-flex justify-content-center align-items-center">

  <div id="card" class="bg-white rounded-4 shadow position-relative d-flex justify-content-center align-items-center" style="width: 300px; height: 450px;">
    
    <div class="top-suit position-absolute top-0 start-0 p-4 fs-1">♦</div>
    
    <div class="number display-1 fw-bold">8</div>
    
    <div class="bottom-suit position-absolute bottom-0 end-0 p-4 fs-1">♦</div>
    
  </div>

  <script src="app.js"></script>
</body>
</html>
